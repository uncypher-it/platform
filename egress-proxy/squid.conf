# =============================================================================
# Squid Forward Proxy — Uncypher Egress Control
# =============================================================================
# Only allows outbound HTTPS to domains listed in allowed_domains.txt.
# All requests are logged for audit. Edit allowed_domains.txt to customize
# which external services can be reached from the Uncypher stack.
# =============================================================================

# Use Docker embedded DNS
dns_nameservers 127.0.0.11

# Listen on port 3128
http_port 3128

# Load allowed domains from file
acl allowed_domains dstdomain "/etc/squid/allowed_domains.txt"

# Allow CONNECT (HTTPS tunneling) only on port 443
acl SSL_ports port 443
acl CONNECT method CONNECT

# Deny CONNECT to non-SSL ports
http_access deny CONNECT !SSL_ports

# Allow traffic to allowlisted domains
http_access allow allowed_domains

# Deny everything else
http_access deny all

# Logging — all requests logged for audit trail
access_log stdio:/var/log/squid/access.log squid
cache_log stdio:/var/log/squid/cache.log

# Strip internal topology information
via off
forwarded_for delete
request_header_access X-Forwarded-For deny all

# Disable caching (we're a forward proxy, not a cache)
cache deny all

# Worker tuning
workers 2
max_filedescriptors 4096
